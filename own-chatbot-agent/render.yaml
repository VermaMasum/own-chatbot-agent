services:
  - type: web
    name: own-chatbot-agent-backend
    env: node
    plan: free
    rootDir: own-chatbot-agent
    buildCommand: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: DATA_DIR
        value: /tmp/data
